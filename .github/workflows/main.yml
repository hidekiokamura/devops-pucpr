name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Rodar script (simples)
        run: echo "CI funcionando!"

  delivery:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Criar arquivo
        run: echo "arquivo de teste" > arquivo.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meu-arquivo
          path: arquivo.txt

  deploy:
    runs-on: ubuntu-latest
    needs: delivery

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: meu-arquivo

      - name: Mostrar conteúdo
        run: cat arquivo.txt
